name: Certora

on: [push, pull_request]

jobs:
  certora:
    name: Certora
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stusds:
          - stusds
          - rate-setter
          - mom

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '11'
          java-package: jre

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install solc-select
        run: pip3 install solc-select

      - name: Solc Select 0.8.21
        run: solc-select install 0.8.21

      - name: Solc Select 0.5.12
        run: solc-select install 0.5.12

      - name: Install Certora
        run: pip3 install certora-cli-beta

      - name: Verify ${{ matrix.stusds }}
        run: make certora-${{ matrix.stusds }} results=1
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
